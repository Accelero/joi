# Set at process-exec time for everything Cargo runs (notably `cargo run`, which `tauri dev` uses),
# and inherited across hot-reload restarts. Must be here, not in `main()`: WebKitGTK reads this
# before `main` runs, so an in-process `set_var` is too late.
#
# WebKitGTK's DMABUF renderer paints a blank window on many Wayland/GPU/driver combos; disabling it
# fixes that while keeping accelerated compositing on (so React's post-load DOM repaints). Cargo's
# `[env]` does not override values already in the environment, so you can still opt back in / add
# `WEBKIT_DISABLE_COMPOSITING_MODE` yourself if needed.
[env]
WEBKIT_DISABLE_DMABUF_RENDERER = "1"

# Base directory ts-rs writes the generated TS IPC bindings into (S5b). `relative = true` resolves it
# against this file's parent (the repo root) so it's portable across machines/CI. ts-rs reads this at
# test runtime; the export tests (run by `cargo test`) emit `src/bindings/*.ts` here, and all types
# share one dir so their cross-imports stay clean (`./Foo`). See crates/joi-core derives `#[ts(export)]`.
TS_RS_EXPORT_DIR = { value = "src/bindings", relative = true }
