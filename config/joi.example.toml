# Joi example configuration (PLAN §4.3).
# Copy to ~/.config/joi/joi.toml and edit. Any field can be overridden by a JOI_-prefixed env var
# (nested via `__`), e.g. JOI_PROVIDER__MODEL=... or JOI_AUDIO__FRAME_MS=30.
#
# SECRETS ARE NEVER IN CONFIG. The API key lives only in the OS keychain (SPEC SEC-5); for dev you
# may set GEMINI_API_KEY in the environment (read at runtime, never persisted).

[provider]
name = "gemini"                                   # gemini | openai | mock
model = "models/gemini-3.1-flash-live-preview"   # Gemini Live BiDi model (NOTES-adk.md)
voice = "Aoede"
system_instruction = "You are Joi, a concise local voice companion."
input_transcription  = true   # FR-3: needed to render the user transcript
output_transcription = true   # FR-3: needed to render the agent transcript

[audio]
input_sample_rate  = 16000    # to provider (16 kHz mono PCM16)
output_sample_rate = 24000    # from provider (24 kHz mono PCM16)
frame_ms = 20                 # 20 ms = 320 samples at 16 kHz
input_device  = "default"
output_device = "default"

[screen]
enabled = false
capture_path = "auto"         # auto | webview | native  (auto resolves via the M0 spike result)
fps = 1.0
# Provider-specific: Gemini Live downsamples each video frame to ~768 px (one tile); sending more
# is wasted bytes. Raise only if you switch to an API that uses higher-resolution frames.
max_width = 768
quality = 80                  # 1-100

[history]
# dir defaults to the XDG data dir (~/.local/share/joi/history).
# token_budget bounds persisted history (SPEC §6.2). Unit = approx tokens (chars/4 heuristic).
# IMPORTANT: this is the *Live session* input budget, much smaller than the 1M text-model context
# window — do NOT copy the 1M number. Confirm against the model card during M2/M3.
token_budget = 32000

[terminal]
theme = "joi-dark"
font = "JetBrains Mono"
scrollback = 5000

[logging]
level = "info"                # error | warn | info | debug | trace ; RUST_LOG overrides
# file defaults to the XDG state dir (~/.local/state/joi/joi.log).
