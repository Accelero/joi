# Joi example configuration — copy this to your real config path and edit:
#
#     ~/.config/joi/joi.yaml
#
# (Joi also writes a defaults file there on first run if it's missing.) Every field can be set in
# the file OR overridden by an environment variable; ENV ALWAYS WINS over the file.
#
# Top-level sections map to modules: live_api/history/logging (engine), media (joi-media),
# ui (web frontend). Env mapping: nested keys chain with `JOI_` + `__`, e.g.
# JOI_MEDIA__AUDIO__FRAME_MS=30 sets media.audio.frame_ms. The Gemini key/model also have the
# conventional shortcuts GEMINI_API_KEY and GEMINI_MODEL.

live_api:
  provider: gemini                  # only gemini is supported today
  gemini:
    # Exact model id — set the one your API key has access to (a bidiGenerateContent / Live model).
    model: gemini-live-2.5-flash-native-audio
    # API key. Prefer leaving this empty and exporting GEMINI_API_KEY in your shell instead —
    # a key written here sits in plaintext on disk. (Equivalent: JOI_LIVE_API__GEMINI__API_KEY.)
    api_key: ""
    voice: Aoede
    system_instruction: You are Joi, a concise local voice companion.
    input_transcription: true       # FR-3: render the user transcript
    output_transcription: true      # FR-3: render the agent transcript
  # Background API-reachability probe cadence, in seconds (emits a UiEvent::reachability). It hits a
  # token-free metadata endpoint, so it NEVER consumes tokens. 0 disables periodic polling (a probe
  # still runs at startup and on demand).
  reachability_probe_secs: 20

history:
  dir: null                         # null → XDG data dir (~/.local/share/joi/history)
  token_budget: 32000               # approx tokens; Live session input budget (SPEC §6.2)

logging:
  level: info                       # error | warn | info | debug | trace ; RUST_LOG overrides
  file: null                        # null → XDG state dir (~/.local/state/joi/joi.log)

media:                              # native device I/O (joi-media)
  audio:
    input_sample_rate: 16000        # to provider (16 kHz mono PCM16)
    output_sample_rate: 24000       # from provider (24 kHz mono PCM16)
    frame_ms: 20                    # 20 ms = 320 samples at 16 kHz
    # Audio devices. "default" = follow the OS/desktop default device (what your system mixer or
    # taskbar selects). Set an exact device name to pin a specific mic/speaker and ignore the OS
    # default — useful to bypass a virtual/processed default (e.g. a PipeWire echo-cancel source).
    # Names are the host's device names (logged at startup as "available input/output devices").
    input_device: default
    output_device: default
    # Mic conditioning. Turn these off when an OS/server APM already conditions the input (e.g.
    # routing through PipeWire's echo-cancel source) so you don't double-process — and note an AGC
    # without a co-located echo canceller is echo-blind and can amplify residual echo into false
    # barge-ins.
    echo_cancellation: true           # subtract Joi's own playback from the mic (speakers)
    noise_suppression: true           # WebRTC noise suppression
    auto_gain: true                   # automatic gain control (AGC2)
  screen:
    enabled: false
    capture_path: auto              # auto | webview | native
    fps: 1.0
    # Gemini Live downsamples each video frame to ~768 px (one tile); sending more is wasted bytes.
    max_width: 768
    quality: 80                     # 1-100

ui:                                 # web frontend (loaded by the engine, applied by the UI)
  terminal:
    theme: joi-dark
    font: JetBrains Mono
    scrollback: 5000
    background: transparent           # "#rrggbb" or "transparent" (use the terminal's background)
    accent: "#9aede4"                 # accent color (hex)
